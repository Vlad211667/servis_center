<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Добавить заказ</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container form-card">
        <a href="{{ url_for('index') }}" class="back-link">← Назад</a>
        <h1>Новый заказ</h1>

        <form action="/add" method="POST">
            <div class="form-group">
                <label for="client">Клиент</label>
                <input type="text" id="client" name="client" placeholder="Имя клиента" required>
            </div>
            
            <div class="form-group">
                <label for="device">Устройство</label>
                <input type="text" id="device" name="device" placeholder="Название устройства" required>
            </div>

            <div class="form-group">
                <label for="status">Статус</label>
                <select id="status" name="status">
                    <option value="Принят">Принят</option>
                    <option value="В работе">В работе</option>
                    <option value="Готов">Готов</option>
                </select>
            </div>

            <button type="submit" class="btn btn-submit">Сохранить заказ</button>
        </form>
    </div>
</body>
</html>
