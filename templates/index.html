<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Управление СЦ</title>
</head>
<body>
    <h1>Заказы сервисного центра</h1>
    <a href="/add">Создать новую заявку</a>
    <table border="1" style="width: 100%; margin-top: 20px;">
        <tr>
            <th>ID</th>
            <th>Дата</th>
            <th>Клиент</th>
            <th>Устройство</th>
            <th>Статус</th>
        </tr>
        {% for order in orders %}
        <tr>
            <td>{{ order.id }}</td>
            <td>{{ order.date }}</td>
            <td>{{ order.client }}</td>
            <td>{{ order.device }}</td>
            <td>{{ order.status }}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
